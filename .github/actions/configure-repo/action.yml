name: Configure Repo
description: Sets up Node.js, Corepack, and installs dependencies
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "yarn"
    - name: Enable Corepack
      shell: bash
      run: corepack enable
    - name: Install Dependencies
      shell: bash
      run: yarn install --immutable
