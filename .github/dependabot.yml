version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      npm:
        applies-to: version-updates
        patterns: ["*"]

  - package-ecosystem: github-actions
    directories:
      - "/"
      - "/.github/actions/*"
      - "/.github/workflows/*"
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
